# 全局配置
model:
  name: "Qwen/Qwen3-0.6B"
  torch_dtype: "bfloat16"

sft:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  lr: 2.0e-4
  epochs: 3
  batch_size: 4
  grad_accum: 4
  max_seq_len: 1024
  output_dir: "outputs/sft"

dpo:
  beta: 0.1
  lr: 5.0e-5
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_seq_len: 1024
  output_dir: "outputs/dpo"

quantization:
  bits: [4, 8]
  group_size: 128
  output_dir: "outputs/quantized"

eval:
  output_dir: "outputs/eval"
  max_samples: 200
