# Quantization Configuration

model:
  name: "outputs/dpo/final"   # DPO 后的模型

gptq:
  bits: 4                     # INT4 量化
  group_size: 128             # 每 128 权重共享一组 scale/zero
  desc_act: true              # 激活值排序（提高精度，略降速度）
  dataset: "c4"               # 校准数据集
  num_samples: 128            # 校准样本数

awq:
  bits: 4
  group_size: 128
  zero_point: true
  version: "gemm"             # gemm 或 gemv

# 对比实验矩阵
experiments:
  - method: "gptq"
    bits: 8
    label: "GPTQ-INT8"
  - method: "gptq"
    bits: 4
    label: "GPTQ-INT4"
  - method: "awq"
    bits: 4
    label: "AWQ-INT4"
  - method: "bitsandbytes"
    bits: 4
    label: "BnB-NF4"
