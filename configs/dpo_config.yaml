# DPO Training Configuration
# Input: SFT checkpoint + preference pairs

model:
  name: "outputs/sft/final"       # SFT 输出作为 DPO 输入
  ref_model: "outputs/sft/final"  # reference model = SFT model
  torch_dtype: "bfloat16"

dpo:
  beta: 0.1                       # KL penalty — 消融对比 0.05/0.1/0.2/0.5
  loss_type: "sigmoid"            # 标准 DPO loss
  # loss_type: "ipo"              # 可选: IPO (Identity Preference Optimization)

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "outputs/dpo"
  num_train_epochs: 1             # DPO 通常 1-2 epoch 就够
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8  # effective batch = 16
  learning_rate: 5.0e-5           # DPO LR 比 SFT 低
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  max_length: 2048
  max_prompt_length: 1024
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  report_to: "wandb"
  gradient_checkpointing: true

data:
  train_file: "data/dpo/train.jsonl"
  eval_file: "data/dpo/eval.jsonl"
  # 格式: {"prompt": "...", "chosen": "...", "rejected": "..."}
